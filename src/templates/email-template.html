<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="x-apple-disable-message-reformatting" />
    <title>{{title}}</title>
    <style>
      body, table, td, p, a { -webkit-text-size-adjust: 100%; -ms-text-size-adjust: 100%; }
      body { margin: 0; padding: 0; width: 100% !important; background: #f3f4f6; }
      img { border: 0; outline: none; text-decoration: none; display: block; }
      a { color: inherit; }
      .support { color: #1f2937; text-decoration: none; }
      .code { display: inline-block; padding: 14px 18px; background: #f3f4f6; border-radius: 8px; font-weight: 700; font-size: 20px; letter-spacing: 3px; color: #111; }
      @media only screen and (max-width: 600px) {
        .outer { padding: 18px 10px !important; }
      }
    </style>
  </head>
  <body>
    <div style="display:none;max-height:0;overflow:hidden;opacity:0;color:transparent;">
      {{preheader}}
    </div>
    <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0" style="background:#f3f4f6;">
      <tr>
        <td class="outer" style="padding:32px 16px;">
          <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0" style="max-width:600px;margin:0 auto;">
            <tr>
              <td>
                <div style="font-family:Arial,Helvetica,sans-serif;color:#111;line-height:1.4;">
                  <div style="max-width:600px;margin:0 auto;padding:20px;border:1px solid #e6e6e6;border-radius:6px;background:#ffffff;">
                    {{#ifLogo}}
                    <div style="text-align:center;margin-bottom:18px;"><img src="{{logoUrl}}" alt="{{appName}}" style="height:48px;object-fit:contain;" /></div>
                    {{/ifLogo}}
                    <h2 style="margin:0 0 12px 0;color:#222;font-weight:600;font-size:22px;line-height:1.3;">{{heading}}</h2>
                    {{#ifIntro}}
                    <p style="margin:0 0 14px 0;line-height:1.6;color:#111;font-size:15px;">{{intro}}</p>
                    {{/ifIntro}}
                    {{bodyHtml}}
                    <hr style="border:none;border-top:1px solid #eee;margin:18px 0"/>
                    <p style="font-size:13px;color:#666;margin:0;line-height:1.6;">{{footerNote}}{{#ifSupport}}<br/>Si vous avez besoin d'aide, contactez-nous : <a href="mailto:{{supportEmail}}" class="support">{{supportEmail}}</a>.{{/ifSupport}}</p>
                    <p style="font-size:13px;color:#888;margin-top:12px;line-height:1.6;">Cordialement,<br/>L'équipe {{appName}}</p>
                  </div>
                </div>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
